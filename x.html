<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services Section</title>
    <style>
        /* Enhanced Services Section Styles */
        #services {
            background: linear-gradient(135deg, rgb(1, 2, 27) 0%, rgba(1, 2, 27, 0.95) 50%, rgba(1, 2, 27, 0.9) 100%);
            color: white;
            padding: 100px 0;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }

        #services .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        #services .sub-title {
            text-align: center;
            margin-bottom: 120px;
        }

        #services .sub-title span {
            font-size: 4rem;
            background: linear-gradient(45deg, rgb(23, 238, 177), rgba(23, 238, 177, 0.8), rgba(23, 238, 177, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(23, 238, 177, 0.4);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .constellation-container {
            position: relative;
            width: 100%;
            height: 700px;
            margin: 0 auto;
        }

        .star {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #ffffff 0%, rgb(23, 238, 177) 70%, transparent 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 25px rgba(23, 238, 177, 0.7);
            z-index: 100;
            border: 2px solid rgba(23, 238, 177, 0.3);
            transform: translate(-50%, -50%);
        }

        .star:hover {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 40px rgba(23, 238, 177, 1);
            z-index: 101;
        }

        .star.active {
            background: radial-gradient(circle, rgb(23, 238, 177) 0%, rgba(23, 238, 177, 0.8) 70%, transparent 100%);
            box-shadow: 0 0 40px rgba(23, 238, 177, 0.9);
            transform: translate(-50%, -50%) scale(1.2);
            z-index: 102;
        }

        .constellation-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, rgba(23, 238, 177, 0.4), rgba(23, 238, 177, 0.6));
            transform-origin: left center;
            z-index: 5;
            opacity: 0;
            animation: drawLine 1.5s ease-in-out forwards;
        }

        @keyframes drawLine {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 100%;
                opacity: 1;
            }
        }

        .expertise-card {
            position: fixed;
            width: 350px;
            background: rgba(1, 2, 27, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(23, 238, 177, 0.3);
            border-radius: 20px;
            padding: 30px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.6s ease;
            box-shadow: 0 12px 40px rgba(1, 2, 27, 0.8), 0 0 30px rgba(23, 238, 177, 0.2);
            z-index: 1000;
            pointer-events: auto;
            max-height: 80vh;
            overflow-y: auto;
        }

        .expertise-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .expertise-card h3 {
            font-size: 2rem;
            margin-bottom: 18px;
            color: rgb(23, 238, 177);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .expertise-card .icon {
            font-size: 2.2rem;
        }

        .expertise-card p {
            line-height: 1.7;
            margin-bottom: 25px;
            opacity: 0.95;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .expertise-card .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .skill-tag {
            background: rgba(23, 238, 177, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            border: 1px solid rgba(23, 238, 177, 0.3);
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.9);
        }

        .skill-tag:hover {
            background: rgba(23, 238, 177, 0.25);
            transform: translateY(-2px);
            border-color: rgba(23, 238, 177, 0.5);
        }

        .learn-more {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(45deg, rgb(23, 238, 177), rgba(23, 238, 177, 0.8));
            color: rgb(1, 2, 27);
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 1.05rem;
        }

        .learn-more:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(23, 238, 177, 0.5);
            background: linear-gradient(45deg, rgba(23, 238, 177, 0.9), rgb(23, 238, 177));
        }

        .floating-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(23, 238, 177, 0.4);
            border-radius: 50%;
            animation: float 25s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Close button for expertise cards */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(23, 238, 177, 0.2);
            border: 1px solid rgba(23, 238, 177, 0.4);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgb(23, 238, 177);
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(23, 238, 177, 0.3);
            transform: scale(1.1);
        }

        /* Enhanced glow effects */
        .star::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: radial-gradient(circle, rgba(23, 238, 177, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .expertise-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(45deg, rgba(23, 238, 177, 0.1), transparent, rgba(23, 238, 177, 0.1));
            border-radius: 20px;
            z-index: -1;
        }

        /* Enhanced responsive design */
        @media (max-width: 1200px) {
            .expertise-card {
                width: 320px;
                padding: 25px;
            }
        }

        @media (max-width: 992px) {
            #services {
                padding: 80px 0;
            }
            
            #services .sub-title span {
                font-size: 3.5rem;
            }
            
            .constellation-container {
                height: 600px;
            }
            
            .expertise-card {
                width: 300px;
                padding: 22px;
            }
        }

        @media (max-width: 768px) {
            #services {
                padding: 60px 0;
            }
            
            #services .sub-title {
                margin-bottom: 80px;
            }
            
            #services .sub-title span {
                font-size: 2.8rem;
                letter-spacing: 1px;
            }
            
            .constellation-container {
                height: 500px;
            }
            
            .expertise-card {
                width: 90vw;
                max-width: 350px;
                padding: 20px;
                max-height: 70vh;
                left: 50% !important;
                top: 50% !important;
                transform: translate(-50%, -50%) translateY(40px);
            }
            
            .expertise-card.visible {
                transform: translate(-50%, -50%) translateY(0);
            }
            
            .star {
                width: 25px;
                height: 25px;
            }
        }

        @media (max-width: 576px) {
            #services {
                padding: 50px 0;
            }
            
            #services .container {
                padding: 0 15px;
            }
            
            #services .sub-title span {
                font-size: 2.2rem;
            }
            
            .constellation-container {
                height: 450px;
            }
            
            .expertise-card {
                width: 95vw;
                padding: 18px;
                max-height: 75vh;
            }
            
            .expertise-card h3 {
                font-size: 1.7rem;
                margin-bottom: 15px;
            }
            
            .expertise-card .icon {
                font-size: 1.8rem;
            }
            
            .expertise-card p {
                font-size: 1rem;
                margin-bottom: 20px;
            }
            
            .skill-tag {
                padding: 6px 12px;
                font-size: 0.9rem;
            }
            
            .learn-more {
                padding: 10px 20px;
                font-size: 1rem;
            }
            
            .star {
                width: 22px;
                height: 22px;
            }
        }

        @media (max-width: 480px) {
            #services .sub-title span {
                font-size: 2rem;
            }
            
            .constellation-container {
                height: 400px;
            }
            
            .star {
                width: 20px;
                height: 20px;
            }
        }

        /* Enhanced touch interaction for mobile */
        @media (hover: none) and (pointer: coarse) {
            .star {
                transform: translate(-50%, -50%) scale(1.1);
            }
            
            .star:active {
                transform: translate(-50%, -50%) scale(1.3);
            }
        }
    </style>
</head>
<body>
    <div id="services">
        <div class="container">
            <h1 class="sub-title"><span>My Services</span></h1>
            
            <div class="floating-particles" id="particles"></div>
            
            <div class="constellation-container" id="constellation">
                <!-- Gemini constellation stars will be positioned here -->
            </div>
        </div>
    </div>

    <script>
        console.log('Services section loading...');

        // Improved Gemini constellation layout with better alignment
        const geminiStars = [
            // Left constellation (Castor)
            { x: 20, y: 20, name: 'Frontend Development', icon: '🎨' },
            { x: 25, y: 40, name: 'UI/UX Design', icon: '✨' },
            { x: 18, y: 60, name: 'Web Technologies', icon: '🌐' },
            { x: 28, y: 80, name: 'JavaScript Frameworks', icon: '⚡' },
            
            // Right constellation (Pollux)
            { x: 75, y: 25, name: 'Backend Development', icon: '⚙️' },
            { x: 78, y: 45, name: 'Database Design', icon: '🗄️' },
            { x: 72, y: 65, name: 'API Development', icon: '🔗' },
            { x: 82, y: 85, name: 'System Architecture', icon: '🏗️' },
            
            // Central bridge stars
            { x: 50, y: 30, name: 'Full-Stack Integration', icon: '🔄' },
            { x: 50, y: 75, name: 'DevOps & Cloud', icon: '☁️' }
        ];

        // Optimized constellation connections
        const connections = [
            [0, 1], [1, 2], [2, 3], // Left constellation chain
            [4, 5], [5, 6], [6, 7], // Right constellation chain
            [1, 8], [5, 8], // Connect both sides to top center
            [2, 9], [6, 9], // Connect both sides to bottom center
            [8, 9] // Connect center stars
        ];

        // Expertise details
        const expertiseData = {
            'Frontend Development': {
                description: 'Creating stunning, responsive user interfaces with modern web technologies. Focus on performance, accessibility, and user experience.',
                skills: ['HTML5', 'CSS3', 'JavaScript', 'React', 'Vue.js', 'Tailwind CSS']
            },
            'UI/UX Design': {
                description: 'Designing intuitive user experiences through research, wireframing, and prototyping. User-centered design approach.',
                skills: ['Figma', 'Adobe XD', 'Prototyping', 'User Research', 'Wireframing', 'Design Systems']
            },
            'Web Technologies': {
                description: 'Deep expertise in modern web standards and cutting-edge technologies. Building scalable, maintainable applications.',
                skills: ['Progressive Web Apps', 'WebAssembly', 'Web APIs', 'Service Workers', 'GraphQL']
            },
            'JavaScript Frameworks': {
                description: 'Mastery of popular JavaScript frameworks for building dynamic, interactive web applications with optimal performance.',
                skills: ['React', 'Vue.js', 'Angular', 'Next.js', 'Nuxt.js', 'Svelte']
            },
            'Backend Development': {
                description: 'Building robust, scalable server-side applications and APIs. Expertise in multiple programming languages and frameworks.',
                skills: ['Node.js', 'Python', 'Java', 'Express.js', 'Django', 'Spring Boot']
            },
            'Database Design': {
                description: 'Designing efficient database schemas and optimizing query performance. Experience with SQL and NoSQL databases.',
                skills: ['MySQL', 'PostgreSQL', 'MongoDB', 'Redis', 'Database Optimization', 'Data Modeling']
            },
            'API Development': {
                description: 'Creating RESTful and GraphQL APIs that are scalable, secure, and well-documented. API design best practices.',
                skills: ['REST', 'GraphQL', 'API Documentation', 'Authentication', 'Rate Limiting', 'Microservices']
            },
            'System Architecture': {
                description: 'Designing scalable software architectures. Microservices, distributed systems, and cloud-native solutions.',
                skills: ['Microservices', 'Docker', 'Kubernetes', 'System Design', 'Load Balancing', 'Scalability']
            },
            'Full-Stack Integration': {
                description: 'Seamlessly connecting frontend and backend systems. End-to-end application development and deployment.',
                skills: ['API Integration', 'State Management', 'Authentication', 'Testing', 'Performance Optimization']
            },
            'DevOps & Cloud': {
                description: 'Cloud infrastructure management and deployment automation. CI/CD pipelines and monitoring solutions.',
                skills: ['AWS', 'Azure', 'Docker', 'Jenkins', 'CI/CD', 'Infrastructure as Code']
            }
        };

        const constellation = document.getElementById('constellation');
        let activeCard = null;

        // Initialize constellation when page loads
        function initializeConstellation() {
            console.log('Initializing constellation...');
            
            if (!constellation) {
                console.error('Constellation container not found');
                return;
            }

            createStars();
            
            // Create constellation lines after a short delay
            setTimeout(() => {
                createConstellationLines();
            }, 1000);
        }

        function createStars() {
            console.log('Creating stars...');
            
            geminiStars.forEach((star, index) => {
                const starElement = document.createElement('div');
                starElement.className = 'star';
                starElement.style.left = `${star.x}%`;
                starElement.style.top = `${star.y}%`;
                starElement.dataset.index = index;
                starElement.dataset.name = star.name;
                starElement.title = star.name;
                
                starElement.addEventListener('click', (e) => {
                    e.stopPropagation();
                    console.log('Star clicked:', star.name);
                    showExpertiseCard(star, starElement, index);
                });
                
                constellation.appendChild(starElement);
            });
            
            console.log(`Created ${geminiStars.length} stars`);
        }

        function createConstellationLines() {
            console.log('Creating constellation lines...');
            
            connections.forEach((connection, index) => {
                setTimeout(() => {
                    const [startIndex, endIndex] = connection;
                    const startStar = geminiStars[startIndex];
                    const endStar = geminiStars[endIndex];
                    
                    const line = document.createElement('div');
                    line.className = 'constellation-line';
                    
                    // Calculate line position and rotation
                    const startX = (startStar.x / 100) * constellation.offsetWidth;
                    const startY = (startStar.y / 100) * constellation.offsetHeight;
                    const endX = (endStar.x / 100) * constellation.offsetWidth;
                    const endY = (endStar.y / 100) * constellation.offsetHeight;
                    
                    const deltaX = endX - startX;
                    const deltaY = endY - startY;
                    const length = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    const angle = Math.atan2(deltaY, deltaX) * 180 / Math.PI;
                    
                    line.style.left = `${startX}px`;
                    line.style.top = `${startY}px`;
                    line.style.width = `${length}px`;
                    line.style.transform = `rotate(${angle}deg)`;
                    line.style.animationDelay = `${index * 0.2}s`;
                    
                    constellation.appendChild(line);
                }, index * 150);
            });
        }

        function showExpertiseCard(star, starElement, starIndex) {
            console.log('Showing expertise card for:', star.name);
            
            // Close existing card if open
            if (activeCard) {
                closeExpertiseCard();
                return;
            }

            // Mark star as active
            document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
            starElement.classList.add('active');

            const expertise = expertiseData[star.name];
            if (!expertise) {
                console.error('No expertise data found for:', star.name);
                return;
            }

            const card = document.createElement('div');
            card.className = 'expertise-card';
            
            // Position card intelligently
            const rect = starElement.getBoundingClientRect();
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            
            let cardX, cardY;
            
            if (viewportWidth <= 768) {
                // Mobile: center the card
                cardX = viewportWidth / 2;
                cardY = viewportHeight / 2;
                card.style.left = '50%';
                card.style.top = '50%';
                card.style.transform = 'translate(-50%, -50%) translateY(40px)';
            } else {
                // Desktop: position away from constellation
                const cardWidth = 350;
                const cardHeight = 400;
                
                if (rect.left < viewportWidth / 2) {
                    // Star on left, position card on right
                    cardX = Math.min(viewportWidth - cardWidth - 40, rect.right + 50);
                } else {
                    // Star on right, position card on left
                    cardX = Math.max(40, rect.left - cardWidth - 50);
                }
                
                cardY = Math.max(40, Math.min(rect.top - 50, viewportHeight - cardHeight - 40));
                
                card.style.left = `${cardX}px`;
                card.style.top = `${cardY}px`;
            }
            
            card.innerHTML = `
                <div class="close-btn">&times;</div>
                <h3>
                    <span class="icon">${star.icon}</span>
                    ${star.name}
                </h3>
                <p>${expertise.description}</p>
                <div class="skills">
                    ${expertise.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                </div>
                <a href="#" class="learn-more">Explore Projects</a>
            `;
            
            // Add close button event listener
            const closeBtn = card.querySelector('.close-btn');
            closeBtn.addEventListener('click', closeExpertiseCard);
            
            // Add learn more button event listener
            const learnMoreBtn = card.querySelector('.learn-more');
            learnMoreBtn.addEventListener('click', (e) => {
                e.preventDefault();
                console.log('Learn more clicked for:', star.name);
            });
            
            document.body.appendChild(card);
            activeCard = card;
            
            // Animate in
            requestAnimationFrame(() => {
                card.classList.add('visible');
            });
        }

        function closeExpertiseCard() {
            console.log('Closing expertise card');
            
            if (activeCard) {
                activeCard.classList.remove('visible');
                
                setTimeout(() => {
                    if (activeCard && activeCard.parentNode) {
                        activeCard.parentNode.removeChild(activeCard);
                    }
                    activeCard = null;
                }, 300);
            }
            
            // Remove active class from all stars
            document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
        }

        // Event listeners
        document.addEventListener('click', (e) => {
            if (activeCard && !activeCard.contains(e.target) && !e.target.classList.contains('star')) {
                closeExpertiseCard();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && activeCard) {
                closeExpertiseCard();
            }
        });

        // Handle resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (activeCard) {
                    closeExpertiseCard();
                }
            }, 250);
        });

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            if (!particlesContainer) return;
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 25 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 20) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Initialize everything when DOM is ready
        function initializeServices() {
            console.log('Initializing services section...');
            createParticles();
            initializeConstellation();
        }

        // Start initialization
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeServices);
        } else {
            initializeServices();
        }

        console.log('Services section script loaded');
    </script>
</body>
</html>
